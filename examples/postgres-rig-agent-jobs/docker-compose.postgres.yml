services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rig_agents
      POSTGRES_USER: rig_agents
      POSTGRES_PASSWORD: rig_agents_dev
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rig_agents -d rig_agents"]
      interval: 5s
      timeout: 5s
      retries: 10
