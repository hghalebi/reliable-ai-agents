name: Publish Reliable AI Agents mdBook

on:
  push:
    branches:
      - main
    paths:
      - books/postgres-rig-agent-jobs/**
      - examples/postgres-rig-agent-jobs/**
      - scripts/check-book-links.py
      - scripts/check-book-terminology.py
      - scripts/check-pages-workflow.py
      - scripts/check-public-chapter-structure.py
      - scripts/check-public-mdbook-ci.sh
      - scripts/check-public-repo-surface.py
      - scripts/check-public-mdbook-surface.py
      - scripts/check-rust-boundary-types.py
      - scripts/write-public-build-info.py
      - .github/workflows/mdbook-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install mdBook
        run: cargo install mdbook --version 0.5.2 --locked

      - name: Check and build public mdBook
        run: bash scripts/check-public-mdbook-ci.sh

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: books/postgres-rig-agent-jobs/book

  deploy:
    name: Deploy mdBook
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
